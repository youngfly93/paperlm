name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run heavy Docling + PaddleOCR integration tests"
        required: false
        default: false
        type: boolean

env:
  # Keep __pycache__/.pyc out of the source tree even during CI builds.
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONPYCACHEPREFIX: /tmp/paperlm-pycache

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality gate (py3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev/build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' build twine

      - name: Clean check
        run: bash scripts/clean.sh --check

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/markitdown_paperlm src/paperlm

      - name: Pytest (fast suite — no ML)
        run: |
          pytest \
            --ignore=tests/test_docling_adapter.py \
            --ignore=tests/test_ocr_adapter.py \
            --ignore=tests/test_pdf_converter_e2e.py \
            --cov=markitdown_paperlm \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paperlm-dist
          path: dist/*

  compat:
    name: fast tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Pytest (fast suite — no ML)
        run: |
          pytest \
            --ignore=tests/test_docling_adapter.py \
            --ignore=tests/test_ocr_adapter.py \
            --ignore=tests/test_pdf_converter_e2e.py

  fresh-clone:
    name: fresh-clone pytest (py3.12, no editable install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install only core runtime deps (no paperlm install)
        run: |
          pip install --upgrade pip
          pip install 'markitdown>=0.1.0' 'pdfminer.six>=20231228' 'pdfplumber>=0.11.0' pytest

      - name: Collect + run pure-Python tests via pythonpath setting
        # Reviewer's scenario: clone, no install, pytest. This must pass because
        # pyproject.toml sets `pythonpath = ["src"]` under [tool.pytest.ini_options].
        run: |
          pytest \
            --ignore=tests/test_docling_adapter.py \
            --ignore=tests/test_ocr_adapter.py \
            --ignore=tests/test_pdf_converter_e2e.py

  # Slow integration tests gated behind workflow_dispatch — they download
  # ~500 MB of ML weights and take several minutes each.
  integration:
    name: integration (Docling + PaddleOCR)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_integration == true }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with all ML extras
        run: |
          pip install --upgrade pip uv
          uv pip install --system -e '.[docling,ocr,dev]'

      - name: Build fixture corpus
        # Fixtures are not in git (see .gitignore). fetch.py downloads the 6
        # real papers and rasterizes the 2 synthetic "scanned" variants.
        run: python tests/fixtures/fetch.py

      - name: Run integration tests
        env:
          PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
        run: |
          pytest tests/test_docling_adapter.py tests/test_ocr_adapter.py tests/test_pdf_converter_e2e.py
