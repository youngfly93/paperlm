# Local dev-loop equivalent of .github/workflows/test.yml (minus the test run).
# Install once per clone: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        files: ^src/markitdown_paperlm/
        additional_dependencies:
          - markitdown>=0.1.0

  - repo: local
    hooks:
      - id: no-regenerable-junk
        name: no ._* / __pycache__ / .pyc in commit
        entry: bash scripts/clean.sh --check
        language: system
        pass_filenames: false
